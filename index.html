<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MyanEchoes NFT</title>

<style>
body{margin:0;font-family:Arial;background:#0a0a0a;color:#fff;text-align:center}
header{padding:15px;font-size:24px;background:linear-gradient(90deg,#00c3ff,#ffd700);color:#000}
input,button{padding:10px;margin:5px;border:none;border-radius:5px}
button{background:#00c3ff;color:#000}
.hidden{display:none}
#gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:20px}
.card{background:#111;padding:15px;border-radius:10px;box-shadow:0 0 10px #00c3ff}
.card img{width:100%}
</style>

</head>

<body>

<header>MyanEchoes NFT</header>

<div id="login">
<h2>Login</h2>
<button onclick="googleLogin()">Login with Google</button>
</div>

<div id="member" class="hidden">
<h2>NFT Gallery</h2>
<div id="gallery"></div>
</div>

<div id="admin" class="hidden">
<h2>Admin Dashboard</h2>
<input id="img" placeholder="Image URL">
<input id="name" placeholder="NFT Name">
<input id="desc" placeholder="Description">
<input id="link" placeholder="Link">
<button onclick="addNFT()">Add NFT</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig={
apiKey:"AIzaSyBjEQrF3YgdMR7IotSbJbCB-LxhhRTdEeM",
authDomain:"myanechoes.firebaseapp.com",
projectId:"myanechoes"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const provider=new GoogleAuthProvider();

let admins=["sai924166@gmail.com","sais89758@gmail.com"];
let nfts=[];

window.googleLogin=()=>{
signInWithPopup(auth,provider).then(res=>{
let email=res.user.email;
document.getElementById("login").classList.add("hidden");

if(admins.includes(email)){
document.getElementById("admin").classList.remove("hidden");
}else{
document.getElementById("member").classList.remove("hidden");
renderNFTs();
}
}).catch(err=>{
alert(err.message);
});
};

window.addNFT=()=>{
let img=document.getElementById("img").value;
let name=document.getElementById("name").value;
let desc=document.getElementById("desc").value;
let link=document.getElementById("link").value;

nfts.push({img,name,desc,link});
renderNFTs();
};

function renderNFTs(){
let g=document.getElementById("gallery");
g.innerHTML="";
nfts.forEach(n=>{
g.innerHTML+=`<div class="card">
<img src="${n.img}">
<h3>${n.name}</h3>
<p>${n.desc}</p>
<button onclick="window.open('${n.link}')">View</button>
</div>`;
});
}
</script>

</body>
</html>
