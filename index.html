<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyanEchoes NFT</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:#0b1220;
color:#fff;
}

/* HEADER */
header{
padding:18px;
text-align:center;
font-size:26px;
font-weight:bold;
background:linear-gradient(90deg,#00c6ff,#0072ff);
}

/* CARD */
.box{
max-width:400px;
margin:60px auto;
background:#111827;
padding:25px;
border-radius:15px;
box-shadow:0 0 30px rgba(0,114,255,0.3);
text-align:center;
}

/* INPUT */
input{
width:90%;
padding:12px;
margin:8px 0;
border:none;
border-radius:8px;
background:#1f2937;
color:#fff;
}

/* BUTTON */
button{
width:95%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:#fff;
font-weight:bold;
cursor:pointer;
}

/* GRID */
#gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#111827;
padding:15px;
border-radius:12px;
}

.card img{
width:100%;
border-radius:10px;
}

.hidden{display:none;}
</style>
</head>

<body>

<header>MyanEchoes NFT</header>

<!-- LOGIN -->
<div id="login" class="box">
<h2>Login / Sign Up</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="signup()">Sign Up</button>

<hr>
<button onclick="googleLogin()">Login with Google</button>
</div>

<!-- MEMBER -->
<div id="member" class="hidden">
<h2 style="text-align:center;">NFT Gallery</h2>
<div id="gallery"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="hidden box">
<h2>Admin Dashboard</h2>

<input type="file" id="file">
<input id="name" placeholder="NFT Name">
<input id="desc" placeholder="Description">
<button onclick="addNFT()">Add NFT</button>

<h3>Total Users: <span id="userCount">0</span></h3>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup,
createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBjEQrF3YgdMR7IotSbJbCB-LxhhRTdEeM",
authDomain: "myanechoes.firebaseapp.com",
projectId: "myanechoes",
storageBucket: "myanechoes.firebasestorage.app",
messagingSenderId: "79155858819",
appId: "1:79155858819:web:8fd4ffe96c23dab490bab6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const provider = new GoogleAuthProvider();

// ADMIN EMAIL
const admins = ["sai924166@gmail.com"];

// LOGIN
window.login=()=>{
let email=document.getElementById("email").value;
let pass=document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,pass)
.then(res=>handleUser(res.user.email))
.catch(err=>alert(err.message));
};

// SIGNUP
window.signup=()=>{
let email=document.getElementById("email").value;
let pass=document.getElementById("password").value;

createUserWithEmailAndPassword(auth,email,pass)
.then(res=>handleUser(res.user.email))
.catch(err=>alert(err.message));
};

// GOOGLE LOGIN
window.googleLogin=()=>{
signInWithPopup(auth,provider)
.then(res=>handleUser(res.user.email))
.catch(err=>alert(err.message));
};

// USER CHECK
function handleUser(email){
document.getElementById("login").classList.add("hidden");

if(admins.includes(email)){
document.getElementById("admin").classList.remove("hidden");
}else{
document.getElementById("member").classList.remove("hidden");
}
}

// NFT ADD (image upload preview)
window.addNFT=()=>{
let file=document.getElementById("file").files[0];
let name=document.getElementById("name").value;
let desc=document.getElementById("desc").value;

let reader=new FileReader();
reader.onload=()=>{
document.getElementById("gallery").innerHTML+=`
<div class="card">
<img src="${reader.result}">
<h3>${name}</h3>
<p>${desc}</p>
</div>`;
};
reader.readAsDataURL(file);
};

// USER COUNT (simple)
document.getElementById("userCount").innerText="Active";
</script>

</body>
</html>
